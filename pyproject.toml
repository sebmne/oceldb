[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "oceldb"
version = "0.2.0"
description = "Filter and query OCEL 2.0 event logs on disk via DuckDB"
authors = [{name = "Sebastian Menne", email = "sebastian.menne@rwth-aachen.de"}]
license = {text = "MIT"}
requires-python = ">=3.12"
dependencies = [
    "duckdb>=1.5.0",
]

[project.optional-dependencies]
pm4py = ["pm4py>=2.7"]
dev = ["pytest", "ruff", "pm4py>=2.7"]

[project.urls]
Repository = "https://github.com/sebmne/oceldb"

[tool.hatch.build.targets.wheel]
packages = ["src/oceldb"]
